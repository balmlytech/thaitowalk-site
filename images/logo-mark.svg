<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" role="img" aria-label="Thai To Walk">
  <g fill="none" stroke="#F58220" stroke-linecap="round" stroke-linejoin="round">
    <!-- runner: head -->
    <circle cx="96" cy="86" r="30" fill="#F58220" stroke="none"/>
    <!-- torso -->
    <path d="M104 120 L128 196" stroke-width="40"/>
    <!-- front leg (forward) -->
    <path d="M126 194 L94 230 L72 270" stroke-width="27"/>
    <!-- back leg (extended) -->
    <path d="M126 194 L154 232 L188 264" stroke-width="27"/>
    <!-- back arm -->
    <path d="M110 130 L92 168" stroke-width="22"/>
    <!-- front arm reaching to the box -->
    <path d="M112 126 L158 150" stroke-width="22"/>
  </g>

  <!-- takeaway noodle carton (no text) -->
  <path d="M150 152 L254 120 L236 200 L168 204 Z" fill="#F58220"/>
  <!-- carton folded front flap -->
  <path d="M168 204 L236 200 L226 214 L178 216 Z" fill="#D96A10"/>

  <!-- noodle swirl at the carton opening -->
  <g fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round">
    <path d="M168 150 C188 138 196 158 214 148 C230 140 232 156 246 148"/>
    <path d="M172 162 C190 152 200 170 218 160"/>
  </g>

  <!-- chopsticks -->
  <g stroke="#F58220" stroke-width="8" stroke-linecap="round">
    <path d="M206 130 L184 70"/>
    <path d="M220 128 L204 66"/>
  </g>

  <!-- steam -->
  <g fill="none" stroke="#F58220" stroke-width="7" stroke-linecap="round">
    <path d="M238 116 C250 102 230 92 244 76 C254 64 238 56 250 42"/>
    <path d="M262 122 C272 110 256 102 268 88"/>
  </g>
</svg>
